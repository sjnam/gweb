name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Only the bootstrap Go is committed; tangle the rest (the weave package
      # and gweave's main) before vet/test/gofmt can see a complete tree.
      - name: generate
        run: make generate

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: bootstrap (the .w sources must reproduce the committed Go tree)
        run: make bootstrap

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

